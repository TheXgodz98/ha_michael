name: "Dashboard Custom"
version: "0.14.3"
slug: "dashboard_custom"
description: "Webapp custom per il controllo casa (luci, tapparelle, ecc.), indipendente dal ciclo di aggiornamento di HAOS"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:view-dashboard
panel_title: "Casa"
hassio_api: true
homeassistant_api: true
map: []
options:
  growatt_hosts:
    - "192.168.1.3"
    - "192.168.1.8"
  growatt_port: 502
  growatt_username: ""
  growatt_password: ""
schema:
  growatt_hosts: ["str"]
  growatt_port: "port"
  growatt_username: "str?"
  growatt_password: "password?"
