# Luce cabina armadio: comandata da sensore di presenza, SOLA LETTURA.
# Mappata come binary_sensor, non come light, per non esporre un controllo
# che genererebbe conflitto con la logica automatica del sensore.
binary_sensor:
  - platform: ads
    name: Luce Cabina Armadio
    unique_id: ads_luce_cabina_armadio
    adsvar: MAIN_LUCE.fb_luce_cabina_armadio.out_luce
    device_class: light
    device:
      identifiers: ["luce_cabina_armadio"]
      name: "Luce Cabina Armadio"
      suggested_area: "Cabina Armadio"
