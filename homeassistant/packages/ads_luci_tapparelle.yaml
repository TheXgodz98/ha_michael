# ============================================================
# FASE 1 — Hardening configurazione ADS (luci + tapparelle)
# ============================================================
# Modifiche rispetto alla configurazione attuale:
# - Aggiunto unique_id a tutte le entità (necessario per rinominare/gestire da UI)
# - Aggiunto device + suggested_area per raggruppamento automatico per stanza
# - Aggiunto adsvar_set mancante sulle luci (comando, stessa variabile dello stato)
# - Aggiunte 2 luci nuove trovate in GVL: luce_cappa, luce_cabina_armadio
# - luce_cabina_armadio mappata come binary_sensor (comandata da sensore di
#   presenza, sola lettura, NON comandabile da HA)
# - Rimosso adsvar (stato) dalle tapparelle: stato_tapparella_N non è
#   utilizzato nel programma PLC
# - Rimosso adsvar_stop dalle tapparelle: non esiste un comando di stop reale
#   (il PLC ferma il motore solo ridando lo stesso comando di marcia, logica
#   che la piattaforma ads cover nativa non supporta — vedi nota in fondo)
#
# NOTA IMPORTANTE su luci:
# adsvar e adsvar_set puntano alla STESSA variabile (es. fb_luce_tavolo.out_luce)
# perché è il programma MAIN a forzare quell'output sul fronte di pressione
# pulsante, non una logica interna del FB che la sovrascrive ciclicamente.
# Se in futuro notassi che i comandi da HA "non tengono" (si resettano da soli
# al ciclo successivo), è segno che il MAIN riscrive out_luce continuamente:
# in quel caso bisognerà rivedere la logica PLC (es. introdurre un vero
# VAR_INPUT di comando sul FB, separato dall'output di stato).
#
# NOTA su tapparelle:
# Niente adsvar_stop: al momento non esiste un vero comando di stop nel PLC.
# Le card cover in HA mostreranno solo i controlli apri/chiudi.

cover:
  - platform: ads
    name: Tapparella Ingresso
    unique_id: ads_tapparella_ingresso
    adsvar_open: GVL_MQTT.rq_apri_tapparella_1
    adsvar_close: GVL_MQTT.rq_chiudi_tapparella_1
    device_class: curtain
    device:
      identifiers: ["tapparella_ingresso"]
